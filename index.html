<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <!-- Primary SEO -->
    <title>Dizi — Catálogos Digitales para MYPEs Peruanas</title>

    <meta name="author" content="Dizi" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://dizi.idenza.site/" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://dizi.idenza.site/" />
    <meta property="og:title" content="Dizi — Catálogos Digitales para MYPEs Peruanas" />
    <meta property="og:description" content="Crea tu catálogo digital en 2 minutos y vende por WhatsApp. Sin descargas, 100% móvil, actualización en tiempo real." />
    <meta property="og:image" content="https://dizi.idenza.site/images/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:locale" content="es_PE" />
    <meta property="og:site_name" content="Dizi" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@DiziPeru" />
    <meta name="twitter:title" content="Dizi — Catálogos Digitales para MYPEs Peruanas" />
    <meta name="twitter:description" content="Crea tu catálogo digital en 2 minutos y vende por WhatsApp. Sin descargas, 100% móvil." />
    <meta name="twitter:image" content="https://dizi.idenza.site/images/og-image.png" />

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="/images/Icono.png" />
    <link rel="apple-touch-icon" href="/images/Icono.png" />

    <!-- Structured Data: Organization -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "Dizi",
      "url": "https://dizi.idenza.site",
      "logo": "https://dizi.idenza.site/images/Logo.png",
      "description": "Plataforma de catálogos digitales para MYPEs del Perú. Crea tu tienda online y vende por WhatsApp.",
      "contactPoint": {
        "@type": "ContactPoint",
        "telephone": "+51-925-176-472",
        "contactType": "sales",
        "availableLanguage": "Spanish"
      },
      "areaServed": "PE",
      "sameAs": []
    }
    </script>

    <!-- Structured Data: WebSite with SearchAction -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "Dizi",
      "url": "https://dizi.idenza.site",
      "description": "Catálogos digitales para MYPEs peruanas",
      "inLanguage": "es-PE",
      "potentialAction": {
        "@type": "SearchAction",
        "target": {
          "@type": "EntryPoint",
          "urlTemplate": "https://dizi.idenza.site/t/{search_term_string}"
        },
        "query-input": "required name=search_term_string"
      }
    }
    </script>

    <!-- Structured Data: SoftwareApplication -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "Dizi",
      "operatingSystem": "Web",
      "applicationCategory": "BusinessApplication",
      "description": "Crea catálogos digitales interactivos para tu negocio y recibe pedidos por WhatsApp.",
      "offers": [
        {
          "@type": "Offer",
          "name": "Plan Semilla",
          "price": "0",
          "priceCurrency": "PEN",
          "description": "Hasta 20 productos, gratis para siempre."
        },
        {
          "@type": "Offer",
          "name": "Plan Emprendedor",
          "price": "14.90",
          "priceCurrency": "PEN",
          "description": "Hasta 50 productos, buscador inteligente."
        },
        {
          "@type": "Offer",
          "name": "Plan Catálogo Pro",
          "price": "19.90",
          "priceCurrency": "PEN",
          "description": "Hasta 200 productos, estadísticas básicas."
        },
        {
          "@type": "Offer",
          "name": "Plan Ilimitado",
          "price": "34.90",
          "priceCurrency": "PEN",
          "description": "Productos ilimitados, soporte prioritario."
        }
      ],
      "aggregateRating": {
        "@type": "AggregateRating",
        "ratingValue": "4.8",
        "reviewCount": "120"
      }
    }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
